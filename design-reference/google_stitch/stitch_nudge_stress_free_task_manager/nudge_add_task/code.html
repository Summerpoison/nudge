<!DOCTYPE html>

<style>
        body {
            background-color: #f9f9f9;
            color: #1a1c1c;
            overflow-x: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .soft-shadow {
            box-shadow: 0 10px 30px rgba(31, 111, 95, 0.08);
        }
        .input-glow:focus {
            outline: none;
            box-shadow: 0 0 0 2px #006d41;
        }
        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

<body class="font-body-md text-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- Sidebar Navigation Shell -->
<aside class="hidden md:flex h-screen w-64 fixed left-0 top-0 bg-surface-container-low dark:bg-surface-container-highest flex-col p-4 gap-2 z-50">
<div class="flex flex-col gap-1 mb-8 px-4">
<h1 class="font-headline-md text-headline-md text-primary">Nudge</h1>
<p class="text-on-surface-variant opacity-70">Stay calm</p>
</div>
<nav class="flex flex-col gap-2">
<!-- Active Logic: Since this is an "Add Task" action, typically associated with "Today" or a FAB, we treat it as a task-focused sub-state, but default Today as the closest contextual parent. -->
<a class="flex items-center gap-4 text-on-surface-variant hover:bg-surface-variant rounded-full px-4 py-3 transition-all active:scale-98" href="#">
<span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
<span class="font-body-md text-body-md">Today</span>
</a>
<a class="flex items-center gap-4 text-on-surface-variant hover:bg-surface-variant rounded-full px-4 py-3 transition-all active:scale-98" href="#">
<span class="material-symbols-outlined" data-icon="inbox">inbox</span>
<span class="font-body-md text-body-md">Inbox</span>
</a>
<a class="flex items-center gap-4 text-on-surface-variant hover:bg-surface-variant rounded-full px-4 py-3 transition-all active:scale-98" href="#">
<span class="material-symbols-outlined" data-icon="folder">folder</span>
<span class="font-body-md text-body-md">Projects</span>
</a>
<a class="flex items-center gap-4 text-on-surface-variant hover:bg-surface-variant rounded-full px-4 py-3 transition-all active:scale-98" href="#">
<span class="material-symbols-outlined" data-icon="archive">archive</span>
<span class="font-body-md text-body-md">Archive</span>
</a>
</nav>
<div class="mt-8 px-4">
<!-- CTA from JSON styled as pill button -->
<button class="w-full bg-primary-container text-on-primary-container font-bold py-3 rounded-full flex items-center justify-center gap-2 transition-all active:scale-95 shadow-sm">
<span class="material-symbols-outlined" data-icon="add">add</span>
                New Nudge
            </button>
</div>
<div class="mt-auto flex flex-col gap-2">
<a class="flex items-center gap-4 text-on-surface-variant hover:bg-surface-variant rounded-full px-4 py-3 transition-all active:scale-98" href="#">
<span class="material-symbols-outlined" data-icon="help">help</span>
<span class="font-body-md text-body-md">Help</span>
</a>
<a class="flex items-center gap-4 text-on-surface-variant hover:bg-surface-variant rounded-full px-4 py-3 transition-all active:scale-98" href="#">
<span class="material-symbols-outlined" data-icon="shield">shield</span>
<span class="font-body-md text-body-md">Privacy</span>
</a>
</div>
</aside>
<!-- Main Canvas -->
<main class="md:ml-64 min-h-screen flex items-center justify-center p-gutter">
<!-- Background Atmospheric Element -->
<div class="fixed inset-0 pointer-events-none opacity-20 overflow-hidden">

</div>
<section class="relative w-full max-w-[720px] fade-in">
<div class="bg-surface-container-lowest rounded-xl p-10 soft-shadow md:p-16 flex flex-col gap-10">
<!-- Header -->
<div class="flex flex-col gap-2 items-center text-center">
<h2 class="font-headline-lg text-headline-lg text-on-background tracking-tight">Focus your thought</h2>
<p class="text-on-surface-variant opacity-60 max-w-md">Write it down to let it go. Nudge will remind you when the time is right.</p>
</div>
<!-- Input Area -->
<div class="space-y-8">
<div class="relative">
<textarea autofocus="" class="w-full bg-[#1F6F5F]/[0.05] border-none rounded-lg p-6 font-headline-md text-headline-md text-on-background placeholder:text-on-surface-variant/30 resize-none transition-all focus:ring-2 focus:ring-primary focus:bg-white" placeholder="What's on your mind?" rows="2"></textarea>
</div>
<!-- Deadline Interaction -->
<div class="flex flex-wrap items-center justify-center gap-4">
<button class="flex items-center gap-2 px-6 py-3 rounded-full bg-surface-container-low text-on-surface-variant hover:bg-surface-variant transition-all active:scale-95">
<span class="material-symbols-outlined text-[20px]" data-icon="calendar_month">calendar_month</span>
<span class="text-label-md font-label-md">Today</span>
</button>
<button class="flex items-center gap-2 px-6 py-3 rounded-full bg-surface-container-low text-on-surface-variant hover:bg-surface-variant transition-all active:scale-95">
<span class="material-symbols-outlined text-[20px]" data-icon="schedule">schedule</span>
<span class="text-label-md font-label-md">Select time</span>
</button>
<button class="flex items-center gap-2 px-6 py-3 rounded-full bg-surface-container-low text-on-surface-variant hover:bg-surface-variant transition-all active:scale-95">
<span class="material-symbols-outlined text-[20px]" data-icon="label">label</span>
<span class="text-label-md font-label-md">Priority</span>
</button>
</div>
</div>
<!-- Action Bar -->
<div class="flex flex-col md:flex-row items-center justify-center gap-6 pt-4 border-t border-surface-container">
<button class="w-full md:w-auto bg-primary text-on-primary font-bold px-12 py-4 rounded-full shadow-lg hover:shadow-xl hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3">
<span class="text-headline-md">Nudge it</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<button class="text-on-surface-variant opacity-60 hover:opacity-100 font-label-md px-6 py-3 transition-all">
                        Cancel
                    </button>
</div>
</div>
<!-- Footer Message -->
<div class="mt-12 text-center text-on-surface-variant/40 text-label-sm font-label-sm">
                Press <span class="bg-surface-container px-2 py-1 rounded mx-1">⌘ + Enter</span> to nudge instantly
            </div>
</section>
</main>
<!-- Visual Enhancers (Floating Blobs) -->
<div class="fixed top-[-10%] right-[-10%] w-96 h-96 bg-primary-container/20 blur-[100px] rounded-full -z-10"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-80 h-80 bg-secondary-container/20 blur-[80px] rounded-full -z-10"></div>
<script>
        // Micro-interaction for the textarea: resize it automatically
        const textarea = document.querySelector('textarea');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Simple keyboard shortcut simulation
        document.addEventListener('keydown', function(e) {
            if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
                const btn = document.querySelector('button.bg-primary');
                btn.classList.add('scale-95');
                setTimeout(() => {
                    btn.classList.remove('scale-95');
                    alert('Nudge added successfully. Stay calm.');
                    textarea.value = '';
                }, 200);
            }
        });
    </script>
</body></html>
